<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>

</head>

<body>
    <div class="bg-container ">
        <h1 class="heading">Time <br> Converter</h1>
        <p class="paragraph">Enter hours and minutes<br>values to convert into <br>seconds</p>
        <p class="para">Hours *</p>
        <input type="number" class="input-val" id="hoursInput" />
        <p class="para">Minutes *</p>
        <input type="number" class="input-val" id="minutesInput" />
        <br>
        <button class="button" id="convertBtn">Convert to Seconds</button>
        <p id="timeInSeconds"></p>
        <p class="para1" id="errorMsg"></p>
    </div>
</body>

</html>
